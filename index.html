<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Silver Screen">
<title>Silver Screen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#C9A84C;--gold-light:#e8c96a;--gold-dim:#8a6f2e;
  --bg:#faf9f6;--bg2:#f2efe8;--bg3:#e8e3d8;
  --card:#ffffff;--card-border:#ddd8cc;
  --text:#1a1712;--text2:#5a5040;--text3:#9a8e7a;
  --red:#c0392b;
  --font-serif:'Playfair Display',Georgia,serif;
  --font-sans:'Lato','Helvetica Neue',Arial,sans-serif;
  --trans:.22s ease;
}
[data-dark]{
  --bg:#0f0e0c;--bg2:#1a1812;--bg3:#252219;
  --card:#1e1c14;--card-border:#3a3520;
  --text:#f0ead8;--text2:#b0a080;--text3:#6a5e48;
}
html,body{height:100%;overflow-x:hidden}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);min-height:100vh;transition:background var(--trans),color var(--trans);font-size:15px;line-height:1.5}
.app{max-width:420px;margin:0 auto;padding-bottom:90px;min-height:100vh}

/* ── Passcode screen ── */
#passcode-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:40px 24px;text-align:center;
  background:var(--bg);
}
.pc-eyebrow{font-family:var(--font-sans);font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.pc-title{font-family:var(--font-serif);font-size:32px;font-weight:700;color:var(--text);margin-bottom:4px}
.pc-subtitle{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:32px}
.pc-divider{width:48px;height:1px;background:var(--gold);margin:0 auto 32px}
.pc-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:14px}
.pc-dots{display:flex;gap:16px;margin-bottom:32px;justify-content:center}
.pc-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--card-border);background:none;transition:var(--trans)}
.pc-dot.filled{background:var(--gold);border-color:var(--gold)}
.pc-numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:228px}
.pc-key{
  height:60px;border-radius:50%;border:1px solid var(--card-border);background:var(--card);
  font-family:var(--font-serif);font-size:22px;font-weight:600;color:var(--text);
  cursor:pointer;transition:var(--trans);display:flex;align-items:center;justify-content:center;
}
.pc-key:active{background:var(--bg3);transform:scale(.91)}
.pc-key.del{font-family:var(--font-sans);font-size:18px;color:var(--text3)}
.pc-key.empty{border:none;background:none;pointer-events:none}
.pc-err{color:var(--red);font-size:12px;letter-spacing:.5px;min-height:20px;margin-top:12px}
.pc-remember{display:flex;align-items:center;gap:8px;margin-top:20px;cursor:pointer;font-size:12px;color:var(--text3);letter-spacing:.3px}
.pc-remember input{accent-color:var(--gold);width:15px;height:15px;cursor:pointer}
.pc-info{font-size:11px;color:var(--text3);margin-top:20px;letter-spacing:.3px;max-width:260px;line-height:1.6}

/* ── Header ── */
.header{
  padding:env(safe-area-inset-top,24px) 20px 16px;
  padding-top:max(env(safe-area-inset-top,0px),24px);
  border-bottom:1px solid var(--card-border);
  display:flex;align-items:flex-start;justify-content:space-between;
  background:var(--bg);
}
.header-left .eyebrow{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.header-left h1{font-family:var(--font-serif);font-size:26px;font-weight:700;color:var(--text);line-height:1.1}
.header-right{display:flex;gap:8px;align-items:center;padding-top:4px}
.icon-btn{
  width:34px;height:34px;border-radius:50%;border:1px solid var(--card-border);
  background:none;cursor:pointer;color:var(--text2);font-size:16px;
  display:flex;align-items:center;justify-content:center;transition:var(--trans);
}
.icon-btn:active{background:var(--bg3)}

/* ── Tabs ── */
.tabs{display:flex;padding:0 20px;border-bottom:1px solid var(--card-border);background:var(--bg)}
.tab{
  padding:13px 0;margin-right:28px;font-size:11px;letter-spacing:2px;text-transform:uppercase;
  border:none;background:none;cursor:pointer;color:var(--text3);
  border-bottom:2px solid transparent;margin-bottom:-1px;
  font-family:var(--font-sans);font-weight:700;transition:var(--trans);
}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* ── Add form ── */
.add-form{padding:18px 20px 4px}
.suggester-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.suggester-row{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.suggester-chip{
  padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px;
  border:1px solid var(--card-border);background:none;cursor:pointer;
  color:var(--text2);font-family:var(--font-sans);transition:var(--trans);
}
.suggester-chip.selected{background:var(--gold);color:#1a1200;border-color:var(--gold)}
.suggester-chip:active{transform:scale(.93)}
.form-row{display:flex;gap:8px}
.text-input{
  flex:1;padding:11px 14px;border:1px solid var(--card-border);border-radius:6px;
  font-size:14px;font-family:var(--font-sans);background:var(--card);color:var(--text);
  outline:none;transition:var(--trans);
}
.text-input:focus{border-color:var(--gold)}
.text-input::placeholder{color:var(--text3)}
.gold-btn{
  padding:11px 18px;background:var(--gold);color:#1a1200;border:none;border-radius:6px;
  font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;
  font-family:var(--font-sans);cursor:pointer;transition:var(--trans);white-space:nowrap;
}
.gold-btn:active{background:var(--gold-dim);transform:scale(.96)}

/* ── Movie list ── */
.list{padding:8px 20px 16px}
.section-head{
  font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text3);
  margin:16px 0 12px;display:flex;align-items:center;gap:10px;
}
.section-head::after{content:'';flex:1;height:1px;background:var(--card-border)}

/* ── Movie card ── */
.movie-card{
  background:var(--card);border:1px solid var(--card-border);border-radius:8px;
  padding:14px 14px 12px;margin-bottom:10px;transition:var(--trans);
}
.movie-card.watched-card{opacity:.68}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-title{font-family:var(--font-serif);font-size:17px;font-weight:600;color:var(--text);line-height:1.25;flex:1}
.movie-card.watched-card .card-title{text-decoration:line-through;color:var(--text3)}
.card-del{
  width:26px;height:26px;border-radius:4px;border:1px solid var(--card-border);
  background:none;cursor:pointer;color:var(--text3);font-size:13px;
  display:flex;align-items:center;justify-content:center;transition:var(--trans);
  flex-shrink:0;margin-top:1px;
}
.card-del:active{background:var(--bg3)}
.card-meta{display:flex;align-items:center;gap:5px;margin-top:8px;flex-wrap:wrap}
.meta-tag{
  font-size:10px;letter-spacing:.5px;text-transform:uppercase;
  padding:2px 7px;border-radius:3px;background:var(--bg2);color:var(--text3);font-weight:700;
}
.meta-tag.gold{background:rgba(201,168,76,.13);color:var(--gold-dim)}

/* ── Watch action ── */
.watch-action{margin-top:12px;padding-top:12px;border-top:1px solid var(--card-border)}
.watch-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.date-input{
  padding:6px 10px;border:1px solid var(--card-border);border-radius:5px;
  font-size:12px;font-family:var(--font-sans);background:var(--bg2);color:var(--text);
  outline:none;flex:1;min-width:120px;
}
.date-input:focus{border-color:var(--gold)}
.watch-btn{
  padding:6px 14px;background:var(--gold);color:#1a1200;border:none;border-radius:5px;
  font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;
  font-family:var(--font-sans);cursor:pointer;transition:var(--trans);white-space:nowrap;
}
.watch-btn:active{transform:scale(.94)}

/* ── Ratings ── */
.ratings-section{margin-top:12px;padding-top:12px;border-top:1px solid var(--card-border);display:flex;flex-direction:column;gap:9px}
.rating-row{display:flex;align-items:center;gap:10px}
.rating-name{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);width:46px;font-weight:700;flex-shrink:0}
.stars{display:flex;gap:4px}
.star{
  background:none;border:none;cursor:pointer;
  font-size:19px;color:var(--bg3);line-height:1;transition:var(--trans);padding:0;
}
.star.lit{color:var(--gold)}
.star:active{transform:scale(.82)}
.avg-line{font-size:11px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;font-weight:700;margin-top:6px}
.watched-on{font-size:11px;color:var(--text3);font-style:italic;margin-top:6px}

/* ── Empty ── */
.empty{text-align:center;padding:56px 20px}
.empty-star{font-family:var(--font-serif);font-size:36px;color:var(--gold)}
.empty-rule{width:32px;height:1px;background:var(--gold);margin:14px auto 16px}
.empty h3{font-family:var(--font-serif);font-size:19px;font-weight:600;color:var(--text2);margin-bottom:8px}
.empty p{font-size:13px;color:var(--text3);line-height:1.6;max-width:240px;margin:0 auto}

/* ── Bottom nav ── */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:420px;background:var(--card);border-top:1px solid var(--card-border);
  display:flex;padding:8px 0;padding-bottom:max(env(safe-area-inset-bottom,0px),8px);
  z-index:20;transition:background var(--trans);
}
.nav-btn{flex:1;border:none;background:none;padding:6px 4px;cursor:pointer;font-family:var(--font-sans);display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-btn .nav-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);font-weight:700;transition:var(--trans)}
.nav-btn.active .nav-label{color:var(--gold)}
.nav-icon{font-size:20px;line-height:1}

/* ── Toast ── */
.toast{
  position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--text);color:var(--bg);padding:9px 20px;border-radius:20px;
  font-size:12px;letter-spacing:.5px;opacity:0;
  transition:.3s cubic-bezier(.34,1.56,.64,1);z-index:99;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- Passcode Screen -->
<div id="passcode-screen">
  <div class="pc-eyebrow">★ &nbsp; A Family Production &nbsp; ★</div>
  <h1 class="pc-title">Silver Screen</h1>
  <div class="pc-subtitle">Family Film Journal</div>
  <div class="pc-divider"></div>
  <div class="pc-label">Enter your passcode</div>
  <div class="pc-dots" id="pc-dots">
    <div class="pc-dot" id="d0"></div>
    <div class="pc-dot" id="d1"></div>
    <div class="pc-dot" id="d2"></div>
    <div class="pc-dot" id="d3"></div>
  </div>
  <div class="pc-numpad">
    <button class="pc-key" onclick="pcKey('1')">1</button>
    <button class="pc-key" onclick="pcKey('2')">2</button>
    <button class="pc-key" onclick="pcKey('3')">3</button>
    <button class="pc-key" onclick="pcKey('4')">4</button>
    <button class="pc-key" onclick="pcKey('5')">5</button>
    <button class="pc-key" onclick="pcKey('6')">6</button>
    <button class="pc-key" onclick="pcKey('7')">7</button>
    <button class="pc-key" onclick="pcKey('8')">8</button>
    <button class="pc-key" onclick="pcKey('9')">9</button>
    <button class="pc-key empty"></button>
    <button class="pc-key" onclick="pcKey('0')">0</button>
    <button class="pc-key del" onclick="pcDel()">⌫</button>
  </div>
  <div class="pc-err" id="pc-err"></div>
  <label class="pc-remember">
    <input type="checkbox" id="pc-remember" checked>
    Remember on this device
  </label>
  <div class="pc-info">Choose any 4-digit code and use the same code on every family device to share the same watchlist.</div>
</div>

<!-- Main App -->
<div id="main-app" style="display:none">
  <div class="app">
    <div class="header">
      <div class="header-left">
        <div class="eyebrow">★ &nbsp; A Family Production</div>
        <h1>Silver Screen</h1>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="dark-btn" onclick="toggleDark()" title="Toggle theme">☽</button>
        <button class="icon-btn" onclick="lockApp()" title="Lock / change passcode">⊠</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" id="tab-watchlist" onclick="setTab('watchlist')">Watchlist</button>
      <button class="tab" id="tab-watched" onclick="setTab('watched')">Watched</button>
    </div>
    <div id="tab-content"></div>
  </div>
</div>

<div class="bottom-nav" id="bottom-nav" style="display:none">
  <button class="nav-btn active" id="nav-watchlist" onclick="setTab('watchlist')">
    <div class="nav-icon">🎬</div>
    <span class="nav-label">Watchlist</span>
  </button>
  <button class="nav-btn" id="nav-watched" onclick="setTab('watched')">
    <div class="nav-icon">★</div>
    <span class="nav-label">Watched</span>
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
const MEMBERS = ['Brian', 'Heidi', 'Charli'];
const PC_KEY = 'ss_passcode';
const DARK_KEY = 'ss_dark';

let passcode = '';
let currentPc = '';
let darkMode = false;
let activeTab = 'watchlist';
let state = { movies: [] };
let selectedSuggesters = [];

// ── Helpers ──
function storageKey() { return 'ss_data_' + passcode; }
function saveState() {
  try { localStorage.setItem(storageKey(), JSON.stringify(state)); } catch(e) {}
}
function loadState() {
  try {
    const s = localStorage.getItem(storageKey());
    if (s) state = JSON.parse(s);
    else state = { movies: [] };
  } catch(e) { state = { movies: [] }; }
}
function todayStr() {
  return new Date().toISOString().slice(0, 10);
}
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}
function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Passcode ──
function pcKey(n) {
  if (currentPc.length >= 4) return;
  currentPc += n;
  updateDots();
  if (currentPc.length === 4) setTimeout(submitPc, 200);
}
function pcDel() {
  currentPc = currentPc.slice(0, -1);
  updateDots();
  document.getElementById('pc-err').textContent = '';
}
function updateDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('d' + i).className = 'pc-dot' + (i < currentPc.length ? ' filled' : '');
  }
}
function submitPc() {
  passcode = currentPc;
  const remember = document.getElementById('pc-remember').checked;
  if (remember) try { localStorage.setItem(PC_KEY, passcode); } catch(e) {}
  else try { localStorage.removeItem(PC_KEY); } catch(e) {}
  loadState();
  enterApp();
}
function lockApp() {
  passcode = '';
  currentPc = '';
  selectedSuggesters = [];
  updateDots();
  document.getElementById('pc-err').textContent = '';
  document.getElementById('passcode-screen').style.display = 'flex';
  document.getElementById('main-app').style.display = 'none';
  document.getElementById('bottom-nav').style.display = 'none';
}
function enterApp() {
  document.getElementById('passcode-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  document.getElementById('bottom-nav').style.display = 'flex';
  try {
    if (localStorage.getItem(DARK_KEY) === '1') applyDark(true);
  } catch(e) {}
  renderTab();
}

// ── Dark mode ──
function applyDark(on) {
  darkMode = on;
  if (on) {
    document.documentElement.setAttribute('data-dark', '');
    document.getElementById('dark-btn').textContent = '○';
  } else {
    document.documentElement.removeAttribute('data-dark');
    document.getElementById('dark-btn').textContent = '☽';
  }
}
function toggleDark() {
  applyDark(!darkMode);
  try { localStorage.setItem(DARK_KEY, darkMode ? '1' : '0'); } catch(e) {}
}

// ── Tabs ──
function setTab(t) {
  activeTab = t;
  selectedSuggesters = [];
  ['watchlist', 'watched'].forEach(id => {
    document.getElementById('tab-' + id).className = 'tab' + (t === id ? ' active' : '');
    document.getElementById('nav-' + id).className = 'nav-btn' + (t === id ? ' active' : '');
  });
  renderTab();
}

// ── Render ──
function renderTab() {
  const el = document.getElementById('tab-content');
  if (!el) return;
  el.innerHTML = activeTab === 'watchlist' ? renderWatchlist() : renderWatched();
}

function renderWatchlist() {
  const pending = state.movies.filter(m => !m.watched);
  let html = renderAddForm();
  if (!pending.length) {
    html += `<div class="empty">
      <div class="empty-star">✦</div>
      <div class="empty-rule"></div>
      <h3>The reel is empty</h3>
      <p>Select who's suggesting and add a film to begin your family watchlist.</p>
    </div>`;
  } else {
    html += `<div class="list">
      <div class="section-head">Up Next</div>
      ${pending.map(renderCard).join('')}
    </div>`;
  }
  return html;
}

function renderWatched() {
  const watched = state.movies
    .filter(m => m.watched)
    .sort((a, b) => (b.watchedDate || '') > (a.watchedDate || '') ? 1 : -1);
  if (!watched.length) {
    return `<div class="empty">
      <div class="empty-star">★</div>
      <div class="empty-rule"></div>
      <h3>No films screened yet</h3>
      <p>Mark films as watched from your watchlist to see them here.</p>
    </div>`;
  }
  return `<div class="list">
    <div class="section-head">Screened</div>
    ${watched.map(renderCard).join('')}
  </div>`;
}

function renderAddForm() {
  const chips = MEMBERS.map((m, i) => {
    const sel = selectedSuggesters.includes(i);
    return `<button class="suggester-chip${sel ? ' selected' : ''}" onclick="toggleChip(${i})">${m}</button>`;
  }).join('');
  return `<div class="add-form">
    <div class="suggester-label">Who's suggesting?</div>
    <div class="suggester-row">${chips}</div>
    <div class="form-row">
      <input class="text-input" id="movie-input" placeholder="Film title..." onkeydown="if(event.key==='Enter')doAdd()">
      <button class="gold-btn" onclick="doAdd()">Add</button>
    </div>
  </div>`;
}

function renderCard(m) {
  const suggesters = (m.suggesters || []).map(i => MEMBERS[i]).filter(Boolean);
  const addedFmt = m.added || '';

  let bottomSection = '';
  if (m.watched) {
    // Ratings
    const ratingsHtml = MEMBERS.map((name, i) => {
      const r = (m.ratings && m.ratings[i]) || 0;
      const stars = [1,2,3,4,5].map(s =>
        `<button class="star${r >= s ? ' lit' : ''}" onclick="setRating(${m.id},${i},${s})">★</button>`
      ).join('');
      return `<div class="rating-row">
        <span class="rating-name">${name}</span>
        <div class="stars">${stars}</div>
      </div>`;
    }).join('');
    const ratedVals = MEMBERS.map((_, i) => (m.ratings && m.ratings[i]) || 0).filter(r => r > 0);
    const avg = ratedVals.length ? (ratedVals.reduce((a,b) => a+b, 0) / ratedVals.length).toFixed(1) : null;
    bottomSection = `<div class="ratings-section">
      ${ratingsHtml}
      ${avg ? `<div class="avg-line">★ ${avg} avg</div>` : ''}
    </div>
    ${m.watchedDate ? `<div class="watched-on">Screened ${m.watchedDate}</div>` : ''}`;
  } else {
    bottomSection = `<div class="watch-action">
      <div class="watch-row">
        <input type="date" class="date-input" id="date-${m.id}" value="${todayStr()}">
        <button class="watch-btn" onclick="markWatched(${m.id})">Mark Watched</button>
      </div>
    </div>`;
  }

  return `<div class="movie-card${m.watched ? ' watched-card' : ''}">
    <div class="card-top">
      <div class="card-title">${esc(m.title)}</div>
      <button class="card-del" onclick="deleteMovie(${m.id})" title="Remove">✕</button>
    </div>
    <div class="card-meta">
      ${suggesters.map(s => `<span class="meta-tag gold">${s}</span>`).join('')}
      ${addedFmt ? `<span class="meta-tag">${esc(addedFmt)}</span>` : ''}
    </div>
    ${bottomSection}
  </div>`;
}

// ── Actions ──
function toggleChip(i) {
  const idx = selectedSuggesters.indexOf(i);
  if (idx >= 0) selectedSuggesters.splice(idx, 1);
  else selectedSuggesters.push(i);
  renderTab();
  setTimeout(() => { const inp = document.getElementById('movie-input'); if (inp) inp.focus(); }, 10);
}

function doAdd() {
  const inp = document.getElementById('movie-input');
  if (!inp || !inp.value.trim()) { showToast('Please enter a film title'); return; }
  state.movies.unshift({
    id: Date.now(),
    title: inp.value.trim(),
    watched: false,
    suggesters: [...selectedSuggesters],
    ratings: {},
    added: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
  });
  inp.value = '';
  selectedSuggesters = [];
  saveState();
  renderTab();
  showToast('Added to watchlist');
}

function markWatched(id) {
  const m = state.movies.find(x => x.id === id);
  if (!m) return;
  const dateEl = document.getElementById('date-' + id);
  const iso = dateEl ? dateEl.value : todayStr();
  m.watched = true;
  m.watchedDate = fmtDate(iso);
  saveState();
  renderTab();
  showToast('Marked as watched ★');
}

function setRating(id, memberIdx, val) {
  const m = state.movies.find(x => x.id === id);
  if (!m) return;
  if (!m.ratings) m.ratings = {};
  m.ratings[memberIdx] = m.ratings[memberIdx] === val ? 0 : val;
  saveState();
  renderTab();
}

function deleteMovie(id) {
  if (!confirm('Remove this film?')) return;
  state.movies = state.movies.filter(x => x.id !== id);
  saveState();
  renderTab();
  showToast('Removed');
}

// ── Auto-login ──
(function() {
  try {
    const saved = localStorage.getItem(PC_KEY);
    if (saved && saved.length === 4) {
      currentPc = saved;
      updateDots();
      setTimeout(submitPc, 500);
    }
  } catch(e) {}
})();
</script>
